name: Checks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: mkroening/rust-toolchain-toml@efdebac439b4b9a6c5de2df55452c21faa37420f # main

      - name: Add wasm target
        run: rustup target add wasm32-unknown-emscripten

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup vcpkg
        uses: ./.github/actions/vcpkg-setup

      - name: Run clippy (desktop)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run clippy (wasm)
        run: cargo clippy -p pacman --target wasm32-unknown-emscripten --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - uses: taiki-e/install-action@5626e41434f03ab3022d9685405c0645c879f441 # cargo-audit

      - name: Run security audit
        run: cargo audit
