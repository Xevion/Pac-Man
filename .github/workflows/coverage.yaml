name: Code Coverage

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup vcpkg
        uses: ./.github/actions/vcpkg-setup

      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@just

      - name: Generate coverage report
        run: |
          just coverage
        working-directory: pacman

      - name: Check Coveralls Token
        run: |
          if [ -z "${{ secrets.COVERALLS_REPO_TOKEN }}" ]; then
            echo "::warning::COVERALLS_REPO_TOKEN not available - coverage upload skipped (common for Dependabot PRs)"
          else
            echo "COVERALLS_REPO_TOKEN is available - will upload coverage"
          fi

      - name: Coveralls upload
        if: ${{ env.COVERALLS_REPO_TOKEN != '' }}
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ env.COVERALLS_REPO_TOKEN }}
          path-to-lcov: lcov.info
          debug: true
