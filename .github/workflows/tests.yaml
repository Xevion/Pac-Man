name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: mkroening/rust-toolchain-toml@efdebac439b4b9a6c5de2df55452c21faa37420f # main

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup vcpkg
        uses: ./.github/actions/vcpkg-setup

      - uses: taiki-e/install-action@0c80bcf54d007ab0e714c95f3bcc43c387707535 # nextest

      - name: Run nextest
        run: cargo nextest run --workspace --profile ci
        working-directory: pacman
